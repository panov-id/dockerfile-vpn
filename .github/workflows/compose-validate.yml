name: Validate Compose

on:
  pull_request:
    paths:
      - docker-compose.yml
      - .env.example
      - scripts/compose-config-check.sh

permissions:
  contents: read

jobs:
  compose-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Compose file
        run: docker compose --env-file .env.example config >/dev/null

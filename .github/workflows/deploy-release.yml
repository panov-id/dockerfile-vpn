name: Deploy published release

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event.release.prerelease && 'uat' || 'production' }}
    steps:
      - name: Deploy via SSH (git fetch + checkout tag + compose up)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            deploy_directory="${{ vars.DEPLOY_DIRECTORY }}"
            deploy_directory="${deploy_directory%/}"
            cd "${deploy_directory}"
            git config --global --add safe.directory "${deploy_directory}"
            git fetch origin --tags
            git checkout "${{ github.event.release.tag_name }}"
            docker compose up -d --pull always

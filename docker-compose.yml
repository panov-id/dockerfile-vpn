services:
  wireguard:
    image: lscr.io/linuxserver/wireguard:latest
    container_name: wireguard-${COMPOSE_PROJECT_NAME:-vpn}
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      - PUID=${WIREGUARD_CONTAINER_USER_ID:-1000}
      - PGID=${WIREGUARD_CONTAINER_GROUP_ID:-1000}
      - TZ=${WIREGUARD_TIME_ZONE:-Etc/UTC}
      - SERVERURL=${WIREGUARD_SERVER_PUBLIC_HOST:-localhost}
      - SERVERPORT=${WIREGUARD_SERVER_PORT:-51820}
      - PEERS=${WIREGUARD_INITIAL_PEER_COUNT:-1}
      - INTERNAL_SUBNET=${WIREGUARD_INTERNAL_SUBNET:-10.13.13.0}
      - ALLOWEDIPS=${WIREGUARD_ALLOWED_IPS:-0.0.0.0/0}
      - LOG_CONFS=${WIREGUARD_LOG_CONFIGURATIONS:-true}
    volumes:
      - ./config:/config
    ports:
      - "${WIREGUARD_SERVER_PORT:-51820}:${WIREGUARD_SERVER_PORT:-51820}/udp"
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.ip_forward=1
    restart: unless-stopped
    labels:
      - "logging.app=dockerfile-vpn"
      - "logging.stand=${COMPOSE_PROJECT_NAME:-vpn}"

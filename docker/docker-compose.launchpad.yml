# Run platform setup without installing gh/git on the host — only Docker required.
#
#   cp .env.platform.example .env.platform   # fill per-environment blocks
#   ./scripts/launchpad-run.sh
#
# launchpad-run.sh stages keys into .launchpad-keys-staging/ and sets LAUNCHPAD_KEYS_DIRECTORY.

services:
  launchpad:
    build:
      context: ..
      dockerfile: docker/Dockerfile.launchpad
    working_dir: /workspace/app
    volumes:
      - ..:/workspace/app
      - ../.env.platform:/workspace/.env.platform:ro
      - ${LAUNCHPAD_KEYS_DIRECTORY:?Run ./scripts/launchpad-run.sh first}:/run/launchpad/keys:ro
    environment:
      LAUNCHPAD_CONTAINER: "true"
      APP_REPOSITORY_ROOT: /workspace/app
